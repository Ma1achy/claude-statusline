name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Static checks are Node-version-independent, so run them once on a modern
  # Node (ESLint 10 requires Node 20+).
  check:
    runs-on: ubuntu-latest
    name: typecheck + lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  # The runtime ships for Node 18+, so exercise the test suite on both.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  bundle:
    runs-on: ubuntu-latest
    name: bundle is in sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # The committed statusline.js must match a fresh build of src/ — it ships as
      # the published artifact, so drift would mean users run stale code.
      - run: npm run build
      - run: git diff --exit-code statusline.js
